name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build release
        run: cargo build --release

      - name: Rename binary
        run: |
          $version = "${{ github.ref_name }}"
          Copy-Item "target/release/pathtobonjwa.exe" "PathToBonjwa-${version}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: PathToBonjwa-*.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PathToBonjwa-*.exe
          generate_release_notes: true

  deploy:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Deploy exe and page to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "DEPLOY_SSH_KEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H 10.85.8.110 >> ~/.ssh/known_hosts 2>/dev/null || true
          VERSION="${GITHUB_REF_NAME}"
          scp -i ~/.ssh/id_deploy "PathToBonjwa-${VERSION}.exe" root@10.85.8.110:/pathtobonjwa/PathToBonjwa-latest.exe
          scp -i ~/.ssh/id_deploy deploy/index.html root@10.85.8.110:/pathtobonjwa/index.html
