name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

  build-windows:
    needs: ci
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build release
        run: cargo build --release

      - name: Read version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $v = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches[0].Groups[1].Value
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Rename binary
        shell: pwsh
        run: |
          Copy-Item "target/release/pathtobonjwa.exe" "PathToBonjwa-v${{ steps.version.outputs.VERSION }}.exe"
          Copy-Item "target/release/pathtobonjwa.exe" "PathToBonjwa-latest.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: PathToBonjwa-*.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "latest" \
            --title "PathToBonjwa v${{ steps.version.outputs.VERSION }} (latest)" \
            --notes "Automated release from \`main\` branch.

          **Version:** v${{ steps.version.outputs.VERSION }}
          **Commit:** [\`${GITHUB_SHA::8}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Built:** $(date -u '+%Y-%m-%d %H:%M UTC')

          Download \`PathToBonjwa-latest.exe\` below." \
            PathToBonjwa-latest.exe \
            "PathToBonjwa-v${{ steps.version.outputs.VERSION }}.exe"
